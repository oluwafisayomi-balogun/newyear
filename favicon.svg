<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0800"/>
      <stop offset="100%" style="stop-color:#1f1000"/>
    </linearGradient>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#ffb366"/>
      <stop offset="100%" style="stop-color:#ff6a00"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#cc4400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>

  <!-- Warm glow orb behind clock -->
  <circle cx="32" cy="32" r="20" fill="#ff6a00" opacity="0.18" filter="url(#softBlur)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner ring (subtle) -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#ff6a00" stroke-width="0.5" opacity="0.25"/>

  <!-- Clock tick marks at 12, 3, 6, 9 -->
  <line x1="32" y1="12" x2="32" y2="16" stroke="#ffb366" stroke-width="2"   stroke-linecap="round"/>
  <line x1="52" y1="32" x2="48" y2="32" stroke="#ff6a00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="48" stroke="#ff6a00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="16" y2="32" stroke="#ff6a00" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Minor ticks -->
  <line x1="44.5" y1="14.5" x2="43" y2="17"   stroke="#ff6a00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="49.5" y1="19.5" x2="47" y2="21"   stroke="#ff6a00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="19.5" y1="14.5" x2="21" y2="17"   stroke="#ff6a00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="14.5" y1="19.5" x2="17" y2="21"   stroke="#ff6a00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Hour hand (pointing ~11 o'clock) -->
  <line x1="32" y1="32" x2="23" y2="20"
        stroke="url(#handGrad)" stroke-width="2.8" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Minute hand (pointing ~12, nearly vertical) -->
  <line x1="32" y1="32" x2="32" y2="14"
        stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"
        opacity="0.9"/>

  <!-- Second hand (pointing ~2 o'clock, thin) -->
  <line x1="32" y1="32" x2="40" y2="22"
        stroke="#ff6a00" stroke-width="1" stroke-linecap="round"
        opacity="0.7"/>

  <!-- Center pivot dot -->
  <circle cx="32" cy="32" r="2.8" fill="#ffb366"/>
  <circle cx="32" cy="32" r="1.2" fill="#ffffff"/>

  <!-- Sparkle top-right -->
  <g transform="translate(50, 14)" opacity="0.95" filter="url(#glow)">
    <line x1="0" y1="-4.5" x2="0" y2="4.5" stroke="#ffb366" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-4.5" y1="0" x2="4.5" y2="0" stroke="#ffb366" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#ff6a00" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#ff6a00" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Sparkle bottom-left (smaller) -->
  <g transform="translate(14, 50)" opacity="0.6">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#ffe8cc" stroke-width="1" stroke-linecap="round"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#ffe8cc" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Tiny dot accent top-left -->
  <circle cx="18" cy="16" r="1.2" fill="#ff6a00" opacity="0.5"/>
</svg>
